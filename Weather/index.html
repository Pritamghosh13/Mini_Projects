<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skye — Weather</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="bg-overlay"></div>
  <div class="grain"></div>

  <main class="container">

    <!-- Search Bar -->
    <div class="search-wrapper">
      <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="7"/>
          <line x1="16.5" y1="16.5" x2="22" y2="22"/>
        </svg>
        <input type="text" id="cityInput" placeholder="Search city or location…" autocomplete="off"/>
        <button id="searchBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Weather Card -->
    <div class="weather-card" id="weatherCard">

      <div class="card-top">
        <div class="location-block">
          <h1 class="city" id="cityName">London</h1>
          <!-- <p id="country">UK</p> -->
          
        </div>
        <div class="date-block" id="dateBlock">Sun, 8 Mar</div>
      </div>

      <div class="temp-row">
        <div class="weather-icon" id="weatherIcon">⛅</div>
        <div class="temp-block">
          <span class="temp" id="tempVal">18</span>
          <span class="unit">°C</span>
        </div>
      </div>

      <p class="condition" id="conditionText">Partly Cloudy</p>

      <div class="divider"></div>

      <div class="stats-row">
        <div class="stat">
          <span class="stat-label">Humidity</span>
          <span class="stat-value" id="humidity">62%</span>
        </div>
        <div class="stat">
          <span class="stat-label">Wind</span>
          <span class="stat-value" id="wind">14 km/h</span>
        </div>
        <div class="stat">
          <span class="stat-label">Feels Like</span>
          <span class="stat-value" id="feels_like">16°C</span>
        </div>
      </div>

    </div>

  </main>

  

</body>
<script src="script.js"></script>
</html>
